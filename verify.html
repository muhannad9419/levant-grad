<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>التحقق من الدعوة — مدارس ليفانت الدولية</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy: #1A3A6B;
  --orange: #E8702A;
  --gold: #C8A84B;
  --green: #1D9E75;
  --red: #D94040;
  --amber: #D48A00;
}
body {
  font-family: 'Tajawal', sans-serif;
  background: #F0F3F9;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 0;
}

/* HEADER */
.hdr {
  width: 100%;
  background: var(--navy);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.hdr-logo {
  width: 80px; height: 80px;
  background: white;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  overflow: hidden;
  padding: 4px;
}
.hdr-text .ar { font-size: 16px; font-weight: 700; color: white; }
.hdr-text .en { font-size: 10px; color: rgba(255,255,255,0.6); letter-spacing: 0.5px; }
.hdr-badge {
  margin-right: auto;
  background: var(--orange);
  color: white;
  font-size: 11px;
  font-weight: 600;
  padding: 4px 12px;
  border-radius: 20px;
}

/* LOADING */
.loading {
  margin-top: 80px;
  text-align: center;
}
.spinner {
  width: 48px; height: 48px;
  border: 4px solid rgba(26,58,107,0.15);
  border-top-color: var(--navy);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading p { color: #7A8BA8; font-size: 14px; }

/* RESULT CARD */
.result-wrap {
  width: 100%;
  max-width: 420px;
  padding: 20px 16px 40px;
  display: none;
}

.result-card {
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 12px 50px rgba(0,0,0,0.15);
}

/* STATUS HEADER */
.status-hdr {
  padding: 32px 24px 24px;
  text-align: center;
}
.status-hdr.valid { background: var(--green); }
.status-hdr.invalid { background: var(--red); }
.status-hdr.used { background: var(--amber); }

.status-icon { font-size: 56px; margin-bottom: 12px; display: block; }
.status-title { font-size: 22px; font-weight: 900; color: white; margin-bottom: 4px; }
.status-sub { font-size: 13px; color: rgba(255,255,255,0.8); }

/* INVITE BODY (valid only) */
.invite-body {
  background: white;
  padding: 0;
}
.inv-school-bar {
  background: #F0F3F9;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid #E2E8F0;
}
.inv-school-logo {
  width: 70px; height: 70px;
  background: white;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  overflow: hidden;
  padding: 3px;
  border: 2px solid var(--navy);
}
.inv-school-logo svg { width: 24px; height: 24px; }
.inv-school-name { font-size: 15px; font-weight: 700; color: var(--navy); }
.inv-school-en { font-size: 10px; color: #8A9BB5; letter-spacing: 0.4px; }

.inv-name-section {
  padding: 24px 20px 16px;
  text-align: center;
  border-bottom: 1px dashed #E2E8F0;
}
.inv-name-label { font-size: 12px; color: #8A9BB5; margin-bottom: 8px; }
.inv-name {
  font-size: 24px;
  font-weight: 900;
  color: var(--navy);
  padding: 10px 20px;
  border: 2px solid var(--gold);
  border-radius: 10px;
  display: inline-block;
  background: linear-gradient(135deg, #FFFDF5, #FFF8E8);
  min-width: 200px;
}
.inv-fouj {
  display: inline-block;
  background: var(--navy);
  color: white;
  font-size: 13px;
  font-weight: 700;
  padding: 5px 18px;
  border-radius: 20px;
  margin-top: 12px;
}

.inv-details {
  padding: 16px 20px;
}
.inv-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid #F0F3F9;
}
.inv-row:last-child { border-bottom: none; }
.inv-row-icon {
  width: 34px; height: 34px;
  background: #F0F3F9;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.inv-row-key { font-size: 11px; color: #8A9BB5; }
.inv-row-val { font-size: 14px; font-weight: 600; color: var(--navy); }

.inv-code-bar {
  background: #F7F9FC;
  border-top: 1px solid #E2E8F0;
  padding: 10px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.inv-code { font-family: monospace; font-size: 13px; color: #5A7AA8; letter-spacing: 1px; }
.inv-code-label { font-size: 11px; color: #8A9BB5; }

/* MARK BUTTON */
.mark-btn {
  width: calc(100% - 32px);
  margin: 16px;
  padding: 14px;
  background: var(--green);
  color: white;
  font-family: 'Tajawal', sans-serif;
  font-size: 16px;
  font-weight: 700;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: opacity 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.mark-btn:hover { opacity: 0.9; }
.mark-btn:disabled { background: #8A9BB5; cursor: not-allowed; }
.mark-btn.already { background: #8A9BB5; }

/* FOOTER */
.result-footer {
  text-align: center;
  margin-top: 20px;
  font-size: 12px;
  color: #8A9BB5;
}

/* ERROR CARD */
.error-card {
  background: white;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 12px 50px rgba(0,0,0,0.15);
}
.error-body { padding: 24px 20px; text-align: center; }
.error-body p { font-size: 14px; color: #5A6A85; line-height: 1.8; }
.error-code { font-family: monospace; font-size: 16px; color: var(--red); font-weight: 700; background: #FEF0F0; padding: 6px 14px; border-radius: 6px; display: inline-block; margin: 10px 0; direction: ltr; }

/* NO CODE */
.nocode {
  margin-top: 60px;
  text-align: center;
  padding: 0 30px;
}
.nocode-icon { font-size: 64px; margin-bottom: 16px; display: block; }
.nocode h2 { font-size: 18px; font-weight: 700; color: var(--navy); margin-bottom: 8px; }
.nocode p { font-size: 13px; color: #7A8BA8; line-height: 1.8; }

/* TIMESTAMP */
.ts { font-size: 11px; color: rgba(255,255,255,0.7); margin-top: 6px; }
</style>

    <div class="en">LEVANT INTERNATIONAL SCHOOLS</div>
  </div>

</div>

<!-- LOADING -->
<div class="loading" id="loading">
  <div class="spinner"></div>
  <p>جارٍ التحقق من الدعوة...</p>
</div>

<!-- NO CODE STATE -->
<div class="nocode" id="nocode" style="display:none">
  <span class="nocode-icon">🎓</span>
  <h2>صفحة التحقق من الدعوات</h2>
  <p>هذه الصفحة مخصصة للتحقق من دعوات حفل تخريج<br>فوج الإرتقاء 2025–2026<br><br>الرجاء مسح QR Code الموجود على الدعوة المطبوعة</p>
</div>

<!-- RESULT -->
<div class="result-wrap" id="result-wrap">
  <div id="result-content"></div>
  <div class="result-footer">
    مدارس ليفانت الدولية — حفل التخرج 2026<br>
    للاستفسار: <span dir="ltr">0777857979</span>
  </div>
</div>

<script>
// ============================================================
// GUEST DATABASE — يتم استبداله بالبيانات المُصدَّرة من نظام الإدارة
// ============================================================
const GUESTS_DATA = "__GUESTS_JSON__";
// ============================================================

const EVENT = {
  fouj: "الإرتقاء",
  year: "فوج الإرتقاء 2025–2026",
  date: "السبت 23/5/2026",
  time: "الساعة السابعة مساءً",
  venue: "مطعم تل الرمان"
};

// حالة الحضور تُخزَّن في localStorage (مؤقتة ليوم الحفل)
function getCheckedSet() {
  try { return new Set(JSON.parse(localStorage.getItem('lvt_checked') || '[]')); }
  catch(e) { return new Set(); }
}
function markChecked(code) {
  const s = getCheckedSet(); s.add(code);
  localStorage.setItem('lvt_checked', JSON.stringify([...s]));
}

function getTimestamp() {
  return new Date().toLocaleString('ar-JO', { hour:'2-digit', minute:'2-digit', hour12:true });
}

function render(code) {
  const loading = document.getElementById('loading');
  const wrap = document.getElementById('result-wrap');
  const content = document.getElementById('result-content');
  const nocode = document.getElementById('nocode');

  loading.style.display = 'none';

  let guests;
  try { guests = JSON.parse(GUESTS_DATA); } catch(e) { guests = []; }

  if (!guests || guests.length === 0) {
    nocode.style.display = 'block';
    return;
  }

  const guest = guests.find(g => g.code === code);
  wrap.style.display = 'block';

  if (!guest) {
    content.innerHTML = `
      <div class="result-card error-card">
        <div class="status-hdr invalid">
          <span class="status-icon">🚫</span>
          <div class="status-title">دعوة غير صالحة</div>
          <div class="status-sub">هذا الرمز غير موجود في قائمة المدعوين</div>
        </div>
        <div class="error-body">
          <p>الرمز الممسوح</p>
          <div class="error-code">${code}</div>
          <p>الرجاء التأكد من صحة الدعوة أو التواصل مع المسؤول</p>
        </div>
      </div>`;
    return;
  }

  const checked = getCheckedSet();
  const alreadyUsed = checked.has(code);

  if (alreadyUsed) {
    content.innerHTML = `
      <div class="result-card">
        <div class="status-hdr used">
          <span class="status-icon">⚠️</span>
          <div class="status-title">دعوة مستخدمة</div>
          <div class="status-sub">تم استخدام هذه الدعوة مسبقاً — الدخول مرفوض</div>
        </div>
        <div class="invite-body">
          <div class="inv-name-section">
            <div class="inv-name-label">اسم المدعو</div>
            <div class="inv-name">${guest.name}</div>
          </div>
          <div class="inv-code-bar">
            <div class="inv-code-label">رمز الدعوة</div>
            <div class="inv-code">${guest.code}</div>
          </div>
        </div>
      </div>`;
    return;
  }

  // VALID — show full invite
  content.innerHTML = `
    <div class="result-card">
      <div class="status-hdr valid">
        <span class="status-icon">✅</span>
        <div class="status-title">دعوة صالحة</div>
        <div class="status-sub">مرحباً بكم في حفل التخرج</div>
        <div class="ts" id="ts-now">${getTimestamp()}</div>
      </div>
      <div class="invite-body">
        <div class="inv-school-bar">
          <div class="inv-school-logo" style="background:white;padding:3px;overflow:hidden;"><img src="LOGO_PLACEHOLDER" style="width:64px;height:64px;object-fit:contain;display:block;"></div>
          <div>
            <div class="inv-school-name">مدارس ليفانت الدولية</div>
            <div class="inv-school-en">LEVANT INTERNATIONAL SCHOOLS</div>
          </div>
        </div>
        <div class="inv-name-section">
          <div class="inv-name-label">السيد / السيدة المدعو/ة</div>
          <div class="inv-name">${guest.name}</div>
          <div class="inv-fouj">${EVENT.fouj} ${EVENT.year.split(' ').pop()}</div>
        </div>
        <div class="inv-details">
          <div class="inv-row">
            <div class="inv-row-icon">📅</div>
            <div><div class="inv-row-key">التاريخ</div><div class="inv-row-val">${EVENT.date}</div></div>
          </div>
          <div class="inv-row">
            <div class="inv-row-icon">🕖</div>
            <div><div class="inv-row-key">الوقت</div><div class="inv-row-val">${EVENT.time}</div></div>
          </div>
          <div class="inv-row">
            <div class="inv-row-icon">📍</div>
            <div><div class="inv-row-key">المكان</div><div class="inv-row-val">${EVENT.venue}</div></div>
          </div>
        </div>
        <div class="inv-code-bar">
          <div class="inv-code-label">رمز الدعوة</div>
          <div class="inv-code">${guest.code}</div>
        </div>
        <button class="mark-btn" id="mark-btn" onclick="markEntry('${guest.code}')">
          ✓ تسجيل الدخول
        </button>
      </div>
    </div>`;
}

function markEntry(code) {
  markChecked(code);
  const btn = document.getElementById('mark-btn');
  btn.textContent = '✓ تم تسجيل الدخول';
  btn.disabled = true;
  btn.classList.add('already');
  // Update header to show "used" state
  document.querySelector('.status-hdr').style.background = '#8A9BB5';
  document.querySelector('.status-title').textContent = 'تم تسجيل الدخول';
  document.querySelector('.status-sub').textContent = 'لا يمكن إعادة استخدام هذه الدعوة';
}

// INIT
window.onload = function() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');

  if (!code) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('nocode').style.display = 'block';
    return;
  }

  setTimeout(() => render(code.toUpperCase()), 600);
};
</script>
</body>
</html>
